version: '3.9'

services:

  nginx:
    image: nginx:latest
    container_name: php003-nginx
    ports:
      - "8081:80"
    volumes:
      - ./app:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./php
    container_name: php003-php
    volumes:
      - ./app:/var/www

