services:

  nginx:
    image: nginx:latest
    container_name: php003-nginx

    ports:
      - "8085:80"

    volumes:
      - ./app:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

  php:
    build: ./php
    container_name: php003-php

    volumes:
      - ./app:/var/www

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: php003-mysql

    restart: always

    environment:
      MYSQL_DATABASE: php003
      MYSQL_ROOT_PASSWORD: root

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: php003-phpmyadmin

    restart: always

    ports:
      - "8086:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data:
